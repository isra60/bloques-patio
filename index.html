<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bloques Patio</title>
    <!-- Google Fonts: Plus Jakarta Sans for a highly modern and premium typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
  </head>
  <body>
    <div id="loginView" class="login-view">
      <form id="loginForm" class="login-panel">
        <div class="login-header">
          <!-- Premium Block Wireframe SVG Logo -->
          <div class="logo-badge">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="m21 7.5-9-5.25L3 7.5m18 0-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25" />
            </svg>
          </div>
          <div>
            <p class="eyebrow">Control de palets</p>
            <h1>Bloques Patio</h1>
          </div>
        </div>
        <label>
          Contraseña
          <input id="passwordInput" type="password" autocomplete="current-password" required placeholder="••••••••" />
        </label>
        <button type="submit">Entrar</button>
        <p id="loginMessage" class="message"></p>
        <p class="login-version">v token-auth</p>
      </form>
    </div>

    <div id="appView" class="app-shell hidden">
      <header class="topbar">
        <div class="topbar-logo">
          <div class="logo-badge mini">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="m21 7.5-9-5.25L3 7.5m18 0-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25" />
            </svg>
          </div>
          <div>
            <p class="eyebrow">Bloques Patio</p>
            <h1>Existencias y pedidos</h1>
          </div>
        </div>
        <div class="topbar-actions">
          <span id="syncState" class="sync-state" data-status="disconnected">Sin conectar</span>
          <button id="seedButton" class="secondary" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="btn-icon">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
            </svg>
            Importar Excel inicial
          </button>
          <button id="logoutButton" class="secondary" type="button">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="btn-icon">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15M12 9l-3 3m0 0 3 3m-3-3h12.75" />
            </svg>
            Salir
          </button>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <div class="toolbar">
            <!-- Modernized search wrapper with inline SVG icon -->
            <div class="search-wrapper">
              <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.602 10.602Z" />
              </svg>
              <input id="searchInput" type="search" placeholder="Buscar bloque o variante..." />
            </div>
          </div>
          <div id="productList" class="product-list"></div>
        </aside>

        <section class="content">
          <div class="summary-grid">
            <div class="summary-card stock-card">
              <div class="card-header">
                <span>Stock Total</span>
                <svg class="card-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M20.25 7.5 12 12m0 0-8.25-4.5M12 12v9m8.25-13.5L12 3m0 0-8.25 4.5M21 12c0 1.66-4 3-9 3s-9-1.34-9-3" />
                </svg>
              </div>
              <strong id="totalStock">0</strong>
            </div>
            <div class="summary-card reserved-card">
              <div class="card-header">
                <span>Reservado</span>
                <svg class="card-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
                </svg>
              </div>
              <strong id="totalReserved">0</strong>
            </div>
            <div class="summary-card available-card">
              <div class="card-header">
                <span>Disponible</span>
                <svg class="card-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                </svg>
              </div>
              <strong id="totalAvailable">0</strong>
            </div>
            <div class="summary-card variants-card">
              <div class="card-header">
                <span>Variantes</span>
                <svg class="card-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" />
                </svg>
              </div>
              <strong id="totalVariants">0</strong>
            </div>
          </div>

          <div class="content-grid">
            <section class="panel">
              <div class="panel-header">
                <div>
                  <p class="eyebrow">Variante seleccionada</p>
                  <h2 id="variantTitle">Selecciona una variante</h2>
                </div>
              </div>
              <div id="variantDetail" class="variant-detail empty-state">
                Elige una variante para ver sus pedidos y editar su stock actual.
              </div>
            </section>

            <section class="panel">
              <div class="panel-header">
                <div>
                  <p class="eyebrow">Nuevo pedido</p>
                  <h2>Añadir reserva</h2>
                </div>
              </div>
              <form id="orderForm" class="order-form">
                <label>
                  Comercial
                  <select id="commercialInput" required>
                    <option value="JESUS">Jesús</option>
                    <option value="FERNANDO">Fernando</option>
                  </select>
                </label>
                <label>
                  Cliente / obra
                  <input id="customerInput" required placeholder="Nombre del cliente o destino..." maxlength="120" />
                </label>
                <label>
                  Palets a reservar
                  <input id="palletsInput" type="number" min="1" step="1" inputmode="numeric" required placeholder="0" />
                </label>
                <label>
                  Notas
                  <textarea id="notesInput" rows="3" placeholder="Detalles de entrega, plazos..."></textarea>
                </label>
                <button type="submit">
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="btn-icon">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                  </svg>
                  Guardar pedido
                </button>
              </form>
            </section>
          </div>
        </section>
      </main>
    </div>

    <template id="variantTemplate">
      <button class="variant-row" type="button">
        <span class="variant-name"></span>
        <span class="variant-metrics"></span>
      </button>
    </template>

    <script src="assets/app.js"></script>
  </body>
</html>
